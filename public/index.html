<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>SwitchBot Dashboard</title>
    <meta name="description" content="個人用 SwitchBot ダッシュボード">
    <link rel="stylesheet" href="/styles.css">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#e60012">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SwitchBot">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <h1>SwitchBot</h1>
          <p class="status-meta">
            <span id="stateDot" class="state-dot" aria-hidden="true"></span>
            <span id="connectionState">確認中</span>
            <span class="sep">·</span>
            <span>更新 <span id="lastUpdated">-</span></span>
            <span class="sep">·</span>
            <span>次回 <span id="nextRefresh">-</span></span>
          </p>
        </div>
        <div class="toolbar">
          <button id="refreshButton" class="icon-button" type="button" title="更新" aria-label="更新">
            <span aria-hidden="true">↻</span>
          </button>
          <button id="reorderButton" class="icon-button" type="button" title="並び替え" aria-label="並び替え">
            <span aria-hidden="true">↕</span>
          </button>
          <button id="resetOrderButton" class="icon-button hidden" type="button" title="並びをリセット" aria-label="並びをリセット">
            <span aria-hidden="true">×</span>
          </button>
          <div class="kebab">
            <button id="menuButton" class="icon-button" type="button" title="メニュー" aria-label="メニュー" aria-haspopup="true" aria-expanded="false">
              <span aria-hidden="true">⋮</span>
            </button>
            <div id="menu" class="menu hidden" role="menu" aria-label="メニュー">
              <label class="menu-item toggle-row">
                <input id="autoRefreshToggle" type="checkbox" checked>
                <span>自動更新</span>
              </label>
              <button id="settingsButton" class="menu-item" type="button" role="menuitem">表示設定</button>
              <button id="logoutButton" class="menu-item hidden" type="button" role="menuitem">ログアウト</button>
            </div>
          </div>
        </div>
      </header>

      <main>
        <section id="loginPanel" class="login-panel hidden" aria-live="polite">
          <form id="loginForm" class="login-form">
            <div>
              <h2>ログイン</h2>
              <p>SwitchBot Dashboard のパスワードを入力してください。</p>
            </div>
            <div class="login-row">
              <input id="passwordInput" type="password" autocomplete="current-password" placeholder="Password" required>
              <button type="submit">ログイン</button>
            </div>
            <p id="loginError" class="login-error" role="alert"></p>
          </form>
        </section>

        <section id="setupPanel" class="setup-panel hidden" aria-live="polite">
          <h2>API設定が必要です</h2>
          <p>
            <code>.env.example</code> を <code>.env</code> にコピーして、
            <code>SWITCHBOT_TOKEN</code> と <code>SWITCHBOT_SECRET</code> を設定してください。
          </p>
          <pre>copy .env.example .env
# .env に SWITCHBOT_TOKEN / SWITCHBOT_SECRET を設定
npm start</pre>
        </section>

        <div id="panelBoard" class="panel-board">
          <section class="panel climate-panel" data-panel-id="environment">
            <div class="panel-heading">
              <div>
                <h2>環境</h2>
              </div>
            </div>
            <div id="sensorHighlights" class="sensor-highlights"></div>
          </section>

          <section class="panel remote-panel" data-panel-id="remotes">
            <div class="panel-heading">
              <div>
                <h2>赤外線リモコン</h2>
              </div>
            </div>
            <div id="remoteList" class="remote-list"></div>
          </section>

          <section class="panel controls-panel" data-panel-id="controls">
            <div class="panel-heading">
              <div>
                <h2>操作</h2>
              </div>
            </div>
            <div id="controlList" class="control-list"></div>
          </section>

          <section class="panel device-panel" data-panel-id="devices">
            <div class="panel-heading">
              <div>
                <h2>デバイス一覧</h2>
              </div>
              <div id="deviceFilter" class="segmented" role="tablist" aria-label="デバイス表示">
                <button class="active" type="button" data-filter="all">すべて</button>
                <button type="button" data-filter="sensor">センサー</button>
                <button type="button" data-filter="control">操作</button>
              </div>
            </div>
            <div id="deviceList" class="device-list"></div>
          </section>

          <section class="panel scene-panel" data-panel-id="scenes">
            <div class="panel-heading">
              <div>
                <h2>シーン</h2>
              </div>
            </div>
            <div id="sceneList" class="scene-list"></div>
          </section>

          <section class="panel log-panel" data-panel-id="log">
            <div class="panel-heading">
              <div>
                <h2>ログ</h2>
              </div>
            </div>
            <div id="eventLog" class="event-log" aria-live="polite"></div>
          </section>
        </div>
      </main>
    </div>

    <div id="settingsOverlay" class="settings-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <section class="settings-sheet">
        <div class="settings-head">
          <div>
            <h2 id="settingsTitle">表示設定</h2>
          </div>
          <button id="settingsCloseButton" class="icon-button" type="button" title="閉じる" aria-label="閉じる">
            <span aria-hidden="true">×</span>
          </button>
        </div>
        <div id="settingsBody" class="settings-body"></div>
        <div class="settings-foot">
          <button id="settingsResetButton" type="button">初期化</button>
        </div>
      </section>
    </div>

    <template id="deviceCardTemplate">
      <article class="device-card">
        <div class="card-top">
          <div>
            <h3></h3>
          </div>
          <span class="pill"></span>
        </div>
        <div class="quick-values"></div>
        <div class="actions"></div>
        <details>
          <summary>raw status</summary>
          <pre></pre>
        </details>
      </article>
    </template>

    <script src="/app.js" defer></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
